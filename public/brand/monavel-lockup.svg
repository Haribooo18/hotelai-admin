<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Monavel full lockup</title>
  <desc id="desc">Monavel mark, wordmark and tagline.</desc>
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F4D07B"/>
      <stop offset="0.48" stop-color="#C8A25A"/>
      <stop offset="1" stop-color="#7A4F18"/>
    </linearGradient>
    <linearGradient id="charcoal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2B2F35"/>
      <stop offset="1" stop-color="#0D0F12"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1F5B4C"/>
      <stop offset="1" stop-color="#0B1F1B"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000" flood-opacity=".32"/>
    </filter>
  </defs>

  <g transform="translate(344 50) scale(1)">
    <g filter="url(#softShadow)">
      <polygon points="20,30 145,107 145,458 20,378" fill="url(#gold)" stroke="#F5D788" stroke-opacity=".35" stroke-width="2"/>
      <polygon points="172,152 266,211 266,458 172,399" fill="url(#charcoal)" stroke="#4C5158" stroke-opacity=".35" stroke-width="2"/>
      <polygon points="296,107 428,25 428,378 296,461" fill="url(#green)" stroke="#3A7A68" stroke-opacity=".35" stroke-width="2"/>
    </g>
  </g>

  <text x="600" y="665" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="102" letter-spacing="28"
        fill="url(#gold)">MONAVEL</text>

  <text x="600" y="748" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="27" letter-spacing="12"
        fill="#C8A25A">AI OPERATING SYSTEM FOR HOTELS</text>
</svg>